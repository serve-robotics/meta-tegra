# nvpmodel configuration for NVIDIA Jetson AGX Thor Developer Kit
# Thor uses discrete GPU on PCIe with different sysfs paths than IGX Orin

###########################
# PARAM DEFINITIONS       #
###########################

< PARAM TYPE=FILE NAME=CPU_ONLINE >
CORE_0 /sys/devices/system/cpu/cpu0/online
CORE_1 /sys/devices/system/cpu/cpu1/online
CORE_2 /sys/devices/system/cpu/cpu2/online
CORE_3 /sys/devices/system/cpu/cpu3/online
CORE_4 /sys/devices/system/cpu/cpu4/online
CORE_5 /sys/devices/system/cpu/cpu5/online
CORE_6 /sys/devices/system/cpu/cpu6/online
CORE_7 /sys/devices/system/cpu/cpu7/online
CORE_8 /sys/devices/system/cpu/cpu8/online
CORE_9 /sys/devices/system/cpu/cpu9/online
CORE_10 /sys/devices/system/cpu/cpu10/online
CORE_11 /sys/devices/system/cpu/cpu11/online
CORE_12 /sys/devices/system/cpu/cpu12/online
CORE_13 /sys/devices/system/cpu/cpu13/online

< PARAM TYPE=CLOCK NAME=CPU_A78_0 >
FREQ_TABLE /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_frequencies
MAX_FREQ /sys/devices/system/cpu/cpu0/cpufreq/scaling_max_freq
MIN_FREQ /sys/devices/system/cpu/cpu0/cpufreq/scaling_min_freq
FREQ_TABLE_KNEXT /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_frequencies
MAX_FREQ_KNEXT /sys/devices/system/cpu/cpu0/cpufreq/scaling_max_freq
MIN_FREQ_KNEXT /sys/devices/system/cpu/cpu0/cpufreq/scaling_min_freq

< PARAM TYPE=CLOCK NAME=CPU_A78_1 >
FREQ_TABLE /sys/devices/system/cpu/cpu4/cpufreq/scaling_available_frequencies
MAX_FREQ /sys/devices/system/cpu/cpu4/cpufreq/scaling_max_freq
MIN_FREQ /sys/devices/system/cpu/cpu4/cpufreq/scaling_min_freq
FREQ_TABLE_KNEXT /sys/devices/system/cpu/cpu4/cpufreq/scaling_available_frequencies
MAX_FREQ_KNEXT /sys/devices/system/cpu/cpu4/cpufreq/scaling_max_freq
MIN_FREQ_KNEXT /sys/devices/system/cpu/cpu4/cpufreq/scaling_min_freq

< PARAM TYPE=CLOCK NAME=CPU_A78_2 >
FREQ_TABLE /sys/devices/system/cpu/cpu8/cpufreq/scaling_available_frequencies
MAX_FREQ /sys/devices/system/cpu/cpu8/cpufreq/scaling_max_freq
MIN_FREQ /sys/devices/system/cpu/cpu8/cpufreq/scaling_min_freq
FREQ_TABLE_KNEXT /sys/devices/system/cpu/cpu8/cpufreq/scaling_available_frequencies
MAX_FREQ_KNEXT /sys/devices/system/cpu/cpu8/cpufreq/scaling_max_freq
MIN_FREQ_KNEXT /sys/devices/system/cpu/cpu8/cpufreq/scaling_min_freq

< PARAM TYPE=CLOCK NAME=CPU_A78_3 >
FREQ_TABLE /sys/devices/system/cpu/cpu12/cpufreq/scaling_available_frequencies
MAX_FREQ /sys/devices/system/cpu/cpu12/cpufreq/scaling_max_freq
MIN_FREQ /sys/devices/system/cpu/cpu12/cpufreq/scaling_min_freq
FREQ_TABLE_KNEXT /sys/devices/system/cpu/cpu12/cpufreq/scaling_available_frequencies
MAX_FREQ_KNEXT /sys/devices/system/cpu/cpu12/cpufreq/scaling_max_freq
MIN_FREQ_KNEXT /sys/devices/system/cpu/cpu12/cpufreq/scaling_min_freq

< PARAM TYPE=CLOCK NAME=GPU_GPC >
FREQ_TABLE /sys/class/devfreq/gpu-gpc-0/available_frequencies
MAX_FREQ /sys/class/devfreq/gpu-gpc-0/max_freq
MIN_FREQ /sys/class/devfreq/gpu-gpc-0/min_freq
FREQ_TABLE_KNEXT /sys/class/devfreq/gpu-gpc-0/available_frequencies
MAX_FREQ_KNEXT /sys/class/devfreq/gpu-gpc-0/max_freq
MIN_FREQ_KNEXT /sys/class/devfreq/gpu-gpc-0/min_freq

< PARAM TYPE=CLOCK NAME=GPU_NVD >
FREQ_TABLE /sys/class/devfreq/gpu-nvd-0/available_frequencies
MAX_FREQ /sys/class/devfreq/gpu-nvd-0/max_freq
MIN_FREQ /sys/class/devfreq/gpu-nvd-0/min_freq
FREQ_TABLE_KNEXT /sys/class/devfreq/gpu-nvd-0/available_frequencies
MAX_FREQ_KNEXT /sys/class/devfreq/gpu-nvd-0/max_freq
MIN_FREQ_KNEXT /sys/class/devfreq/gpu-nvd-0/min_freq

###########################
# POWER_MODEL DEFINITIONS #
###########################

# MAXN - Maximum Performance (default)
# All 14 CPU cores at max frequency (2.6 GHz)
# GPU at max frequency (1.575/1.692 GHz)
< POWER_MODEL ID=0 NAME=MAXN >
CPU_ONLINE CORE_0 1
CPU_ONLINE CORE_1 1
CPU_ONLINE CORE_2 1
CPU_ONLINE CORE_3 1
CPU_ONLINE CORE_4 1
CPU_ONLINE CORE_5 1
CPU_ONLINE CORE_6 1
CPU_ONLINE CORE_7 1
CPU_ONLINE CORE_8 1
CPU_ONLINE CORE_9 1
CPU_ONLINE CORE_10 1
CPU_ONLINE CORE_11 1
CPU_ONLINE CORE_12 1
CPU_ONLINE CORE_13 1
CPU_A78_0 MIN_FREQ 756000
CPU_A78_0 MAX_FREQ -1
CPU_A78_1 MIN_FREQ 756000
CPU_A78_1 MAX_FREQ -1
CPU_A78_2 MIN_FREQ 756000
CPU_A78_2 MAX_FREQ -1
CPU_A78_3 MIN_FREQ 756000
CPU_A78_3 MAX_FREQ -1
GPU_GPC MIN_FREQ 0
GPU_GPC MAX_FREQ -1
GPU_NVD MIN_FREQ 0
GPU_NVD MAX_FREQ -1

# 30W - Power limited mode
# All 14 CPU cores at 1.8 GHz max
# GPU at 1.2 GHz max
< POWER_MODEL ID=1 NAME=30W >
CPU_ONLINE CORE_0 1
CPU_ONLINE CORE_1 1
CPU_ONLINE CORE_2 1
CPU_ONLINE CORE_3 1
CPU_ONLINE CORE_4 1
CPU_ONLINE CORE_5 1
CPU_ONLINE CORE_6 1
CPU_ONLINE CORE_7 1
CPU_ONLINE CORE_8 1
CPU_ONLINE CORE_9 1
CPU_ONLINE CORE_10 1
CPU_ONLINE CORE_11 1
CPU_ONLINE CORE_12 1
CPU_ONLINE CORE_13 1
CPU_A78_0 MIN_FREQ 756000
CPU_A78_0 MAX_FREQ 1800000
CPU_A78_1 MIN_FREQ 756000
CPU_A78_1 MAX_FREQ 1800000
CPU_A78_2 MIN_FREQ 756000
CPU_A78_2 MAX_FREQ 1800000
CPU_A78_3 MIN_FREQ 756000
CPU_A78_3 MAX_FREQ 1800000
GPU_GPC MIN_FREQ 0
GPU_GPC MAX_FREQ 1200000000
GPU_NVD MIN_FREQ 0
GPU_NVD MAX_FREQ 1200000000

# 15W - Low power mode
# All 14 CPU cores at 1.2 GHz max
# GPU at 600 MHz max
< POWER_MODEL ID=2 NAME=15W >
CPU_ONLINE CORE_0 1
CPU_ONLINE CORE_1 1
CPU_ONLINE CORE_2 1
CPU_ONLINE CORE_3 1
CPU_ONLINE CORE_4 1
CPU_ONLINE CORE_5 1
CPU_ONLINE CORE_6 1
CPU_ONLINE CORE_7 1
CPU_ONLINE CORE_8 1
CPU_ONLINE CORE_9 1
CPU_ONLINE CORE_10 1
CPU_ONLINE CORE_11 1
CPU_ONLINE CORE_12 1
CPU_ONLINE CORE_13 1
CPU_A78_0 MIN_FREQ 756000
CPU_A78_0 MAX_FREQ 1200000
CPU_A78_1 MIN_FREQ 756000
CPU_A78_1 MAX_FREQ 1200000
CPU_A78_2 MIN_FREQ 756000
CPU_A78_2 MAX_FREQ 1200000
CPU_A78_3 MIN_FREQ 756000
CPU_A78_3 MAX_FREQ 1200000
GPU_GPC MIN_FREQ 0
GPU_GPC MAX_FREQ 600000000
GPU_NVD MIN_FREQ 0
GPU_NVD MAX_FREQ 600000000

< PM_CONFIG DEFAULT=0 >
