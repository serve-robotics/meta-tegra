#@TYPE: Machine
#@NAME: Nvidia Jetson AGX Thor Developer Kit
#@DESCRIPTION: Machine configuration for Nvidia Jetson AGX Thor Developer Kit

# Include tegra264 base configuration
# Thor uses tegra264 chip (0x26) but shares packages with Orin (t234) from NVIDIA deb feed
require conf/machine/include/tegra264.inc

# Thor uses pre-compiled device tree from NVIDIA BSP (thor-devicetree recipe)
# KERNEL_DEVICETREE ?= "nvidia/tegra234-p3767-0000-p3768-0000-a0.dtb"
KERNEL_ARGS ?= "fw_devlink=off"

MACHINE_FEATURES += "ext4 serial usbhost pci wifi bluetooth alsa"
MACHINE_EXTRA_RRECOMMENDS += "kernel-modules"

# Thor board configuration (P3834 module)
TEGRA_BOARDID = "3834"
TEGRA_FAB = "400"
TEGRA_BOARDSKU = "0008"
TEGRA_BOARDREV = "G.5"
TEGRA_CHIPREV = "1"

# Thor uses Tegra264 chip (0x26)
TEGRA_CHIP = "0x26"
NVIDIA_CHIP = "0x26"

# Storage configuration
EMMC_SIZE = "64"
EMMC_BDEV = "mmcblk0"
BOOTPART_SIZE = "0"
BOOTPART_LIMIT = "0"
ROOTFSPART_SIZE = "30064771072"

# Thor-specific settings for SBSA architecture
TEGRA_SBSA = "1"

# CUDA settings for Thor (compute capability 10.0)
CUDA_ARCHITECTURES = "100"
CUDA_NVCC_ARCH_FLAGS = "--gpu-architecture=compute_100 --gpu-code=sm_100"

# Preferred providers and versions
PREFERRED_PROVIDER_virtual/kernel = "linux-tegra"
PREFERRED_PROVIDER_u-boot = "u-boot-tegra"
PREFERRED_PROVIDER_virtual/bootloader = "u-boot-tegra"

# Prefer R38.4.0 recipes over R36.x recipes
PREFERRED_VERSION_tegra-storage-layout-base = "38.4.0"
PREFERRED_VERSION_tegra-firmware = "38.4.0"
PREFERRED_VERSION_linux-tegra = "6.8.12"

TEGRA_AUDIO_DEVICE = "tegrahda"

# Jetson Linux 38.4.0 settings (includes kernel 6.8.12)
L4T_BSP_NAME = "t264"
L4T_BSP_PREFIX = "Jetson"
L4T_SRCS_NAME = "source"
L4T_VERSION = "38.4.0"

# Kernel version for Thor - R38.4.0 includes 6.8.12
KERNEL_VERSION = "6.8.12"
LINUX_VERSION = "6.8.12"

# Serial console
SERIAL_CONSOLES = "115200;ttyUTC0"

# Boot and partition configuration
TNSPEC_BOOTDEV = "mmcblk0p1"
OTABOOTDEV = "/dev/mmcblk0boot0"
OTAGPTDEV = "/dev/mmcblk0boot1"

# Partition layout files for Thor (t264)
PARTITION_LAYOUT_EXTERNAL ??= "flash_l4t_t264_qspi.xml"
PARTITION_LAYOUT_EXTERNAL_DEFAULT ??= "flash_l4t_t264_qspi.xml"

# Partition layout
TEGRAFLASH_NO_INTERNAL_STORAGE = "0"
TEGRAFLASH_SDCARD_SIZE = ""

# Partition configuration
TEGRA_ROOTFS_FSTYPE = "ext4"
TEGRA_BOOTPART_FSTYPE = "vfat"

# Set variables needed by R36.x recipes during parsing to avoid errors
# These will be overridden by R38.4.0 recipes when actually building
PARTITION_LAYOUT_TEMPLATE_DEFAULT ??= "flash_l4t_t264_qspi.xml"
PARTITION_LAYOUT_TEMPLATE_DEFAULT_SUPPORTS_REDUNDANT ??= "1"

# Additional machine-specific settings
MACHINE_HWCODECS = "gstreamer1.0-omx-tegra"
MACHINE_ESSENTIAL_EXTRA_RDEPENDS += "tegra-firmware thor-devicetree kernel-image"

# Blacklist R36.x recipes for Thor builds
SKIP_RECIPE[tegra-firmware-36.4.4] = "Incompatible with L4T 38.4.0"
SKIP_RECIPE[tegra-storage-layout-base-36.4.4] = "Incompatible with L4T 38.4.0"
SKIP_RECIPE[tegra-storage-layout-36.4.4] = "Incompatible with L4T 38.4.0"
SKIP_RECIPE[tegra-binaries-36.4.4] = "Incompatible with L4T 38.4.0"
SKIP_RECIPE[tegra-flashtools-native-36.4.4] = "Incompatible with L4T 38.4.0"
SKIP_RECIPE[tegra-libraries-core-36.4.4] = "Incompatible with L4T 38.4.0"

# Explicitly prefer R38.4.0 versions
PREFERRED_VERSION_tegra-binaries = "38.4.0"

# GLib 2.80 required for NVIDIA GStreamer plugins (built against Ubuntu 24.04)
# Ubuntu 24.04 / JetPack 7 ships GLib 2.80, Yocto Scarthgap has 2.78
PREFERRED_VERSION_glib-2.0 = "2.80.5"
PREFERRED_VERSION_glib-2.0-native = "2.80.5"

# Allow patch fuzz for GLib 2.80 (patches from 2.78 apply with minor fuzz)
ERROR_QA:remove:pn-glib-2.0 = "patch-fuzz"
ERROR_QA:remove:pn-glib-2.0-native = "patch-fuzz"
WARN_QA:append:pn-glib-2.0 = " patch-fuzz"
WARN_QA:append:pn-glib-2.0-native = " patch-fuzz"

# GStreamer 1.24 required for NVIDIA GStreamer plugins (built against Ubuntu 24.04)
PREFERRED_VERSION_gstreamer1.0 = "1.24.12"
PREFERRED_VERSION_gstreamer1.0-native = "1.24.12"
PREFERRED_VERSION_gstreamer1.0-plugins-base = "1.24.12"
PREFERRED_VERSION_gstreamer1.0-plugins-good = "1.24.12"
PREFERRED_VERSION_gstreamer1.0-plugins-bad = "1.24.12"
PREFERRED_VERSION_gstreamer1.0-libav = "1.24.12"
