#@TYPE: Machine
#@NAME: Nvidia Jetson AGX Thor Developer Kit
#@DESCRIPTION: Machine configuration for Nvidia Jetson AGX Thor Developer Kit

# Use standard ARM tune - Thor uses Cortex-A78 cores
DEFAULTTUNE ?= "armv8a-crc-crypto"
require conf/machine/include/arm/arch-armv8a.inc

SOC_FAMILY = "tegra234"
require conf/machine/include/soc-family.inc

require conf/machine/include/tegra-common.inc

KERNEL_DEVICETREE ?= "nvidia/tegra234-p3767-0000-p3768-0000-a0.dtb"
KERNEL_ARGS ?= "console=ttyTCU0,115200 console=tty0 fbcon=map:0"

MACHINE_FEATURES += "ext4 serial usbhost pci wifi bluetooth alsa"
MACHINE_EXTRA_RRECOMMENDS += "kernel-modules"

# Thor uses T5000 module with Tegra234 (same as Orin but SBSA architecture)
TEGRA_BOARDID = "3767"
TEGRA_FAB = "000"
TEGRA_BOARDSKU = "0000"
TEGRA_BOARDREV = ""
TEGRA_CHIPREV = "0"

# Use Tegra234 (same SoC family as Orin)
TEGRA_CHIP = "0x23"
TEGRA_CHIPREV = "2"
NVIDIA_CHIP = "0x23"

# Storage configuration
EMMC_SIZE = "64"
EMMC_BDEV = "mmcblk0"
BOOTPART_SIZE = "0"
BOOTPART_LIMIT = "0"
ROOTFSPART_SIZE = "30064771072"

# Thor-specific settings for SBSA architecture
TEGRA_SBSA = "1"

# CUDA settings for Thor (same compute capability as Orin)
CUDA_ARCHITECTURES = "87"
CUDA_NVCC_ARCH_FLAGS = "--gpu-architecture=compute_87 --gpu-code=sm_87"

# Preferred providers and versions
PREFERRED_PROVIDER_virtual/kernel = "linux-tegra"
PREFERRED_PROVIDER_u-boot = "u-boot-tegra"
PREFERRED_PROVIDER_virtual/bootloader = "u-boot-tegra"

# Prefer R38.2.1 recipes over R36.x recipes
PREFERRED_VERSION_tegra-storage-layout-base = "38.2.1"
PREFERRED_VERSION_tegra-firmware = "38.2.1"
PREFERRED_VERSION_linux-tegra = "6.8"

TEGRA_AUDIO_DEVICE = "tegrahda"

# Jetson Linux 38.2 settings
L4T_BSP_NAME = "t234"
L4T_BSP_PREFIX = "Jetson"
L4T_SRCS_NAME = "public_sources"
L4T_VERSION = "38.2.1"

# Kernel version for Thor
KERNEL_VERSION = "6.8"
LINUX_VERSION = "6.8"

# Serial console
SERIAL_CONSOLES = "115200;ttyTCU0"

# Boot and partition configuration
TNSPEC_BOOTDEV = "mmcblk0p1"
OTABOOTDEV = "/dev/mmcblk0boot0"
OTAGPTDEV = "/dev/mmcblk0boot1"

# Partition layout files - use same as Orin for Tegra234
PARTITION_LAYOUT_EXTERNAL ??= "flash_t234_qspi_sdmmc.xml"
PARTITION_LAYOUT_EXTERNAL_DEFAULT ??= "flash_t234_qspi_sdmmc.xml"

# Partition layout
TEGRAFLASH_NO_INTERNAL_STORAGE = "0"
TEGRAFLASH_SDCARD_SIZE = ""

# Partition configuration
TEGRA_ROOTFS_FSTYPE = "ext4"
TEGRA_BOOTPART_FSTYPE = "vfat"

# Set variables needed by R36.x recipes during parsing to avoid errors
# These will be overridden by R38.2.1 recipes when actually building
PARTITION_LAYOUT_TEMPLATE_DEFAULT ??= "flash_t234_qspi_sdmmc.xml"
PARTITION_LAYOUT_TEMPLATE_DEFAULT_SUPPORTS_REDUNDANT ??= "1"

# Additional machine-specific settings
MACHINE_HWCODECS = "gstreamer1.0-omx-tegra"
MACHINE_ESSENTIAL_EXTRA_RDEPENDS += "tegra-firmware kernel-devicetree kernel-image"

# Blacklist R36.x recipes for Thor builds
SKIP_RECIPE[tegra-firmware-36.4.4] = "Incompatible with L4T 38.2.1"
SKIP_RECIPE[tegra-storage-layout-base-36.4.4] = "Incompatible with L4T 38.2.1"
SKIP_RECIPE[tegra-storage-layout-36.4.4] = "Incompatible with L4T 38.2.1"
SKIP_RECIPE[tegra-binaries-36.4.4] = "Incompatible with L4T 38.2.1"
SKIP_RECIPE[tegra-flashtools-native-36.4.4] = "Incompatible with L4T 38.2.1"
SKIP_RECIPE[tegra-libraries-core-36.4.4] = "Incompatible with L4T 38.2.1"

# Explicitly prefer R38.2.1 versions
PREFERRED_VERSION_tegra-binaries = "38.2.1"
